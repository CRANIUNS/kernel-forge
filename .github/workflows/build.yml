name: Forja do KernelSU Next - Redmi 12 (Fire)

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Sequestrar o Código-Fonte
      uses: actions/checkout@v4
      with:
        repository: mt6768-dev/android_kernel_xiaomi_fire
        ref: lineage-23.2
        fetch-depth: 1

    - name: 2. Instalar Arsenal de Compilação
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential curl flex gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi clang lld llvm libssl-dev libelf-dev

    - name: 3. Injetar KernelSU-Next (Via Script Oficial v1.0.3)
      run: |
        # Usar o instalador oficial forçando o download da tag v1.0.3
        curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/v1.0.3/kernel/setup.sh" | bash -s v1.0.3
        
        # Patch 1: Neutralizar o macro de namespace inexistente no 4.19
        sed -i 's/^MODULE_IMPORT_NS/\/\/ MODULE_IMPORT_NS/g' drivers/kernelsu/core/init.c || true
        
        # Patch 2: Backport da API de memória (copy_to_kernel_nofault -> probe_kernel_write)
        sed -i 's/copy_to_kernel_nofault/probe_kernel_write/g' drivers/kernelsu/hook/arm64/patch_memory.c || true

    - name: 4. Preparar Configuração (Defconfig)
      run: |
        export ARCH=arm64
        mkdir -p out
        make O=out ARCH=arm64 fire_defconfig
        
        # Desativar interrupção por avisos cosméticos
        sed -i 's/CONFIG_WERROR=y/CONFIG_WERROR=n/g' out/.config
        
        # Ativar KernelSU na configuração do núcleo
        echo "CONFIG_KSU=y" >> out/.config

    - name: 5. Compilação do Núcleo (Clang)
      run: |
        export ARCH=arm64
        export KBUILD_BUILD_USER="hacker"
        export KBUILD_BUILD_HOST="cachyos-lab"
        make -j$(nproc --all) O=out \
          ARCH=arm64 \
          CC=clang \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
          LD=ld.lld \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          STRIP=llvm-strip \
          KCFLAGS="-Wno-implicit-int -Wno-return-type"

    - name: 6. Configuração e Empacotamento AnyKernel3
      run: |
        git clone https://github.com/osm0sis/AnyKernel3.git
        cp out/arch/arm64/boot/Image.gz AnyKernel3/
        cd AnyKernel3
        
        # Parâmetros de segurança e arquitetura A/B
        sed -i 's/device.name1=maguro/device.name1=fire/g' anykernel.sh
        sed -i 's/device.name2=toroplus/device.name2=fire_global/g' anykernel.sh
        sed -i 's/is_slot_device=0/is_slot_device=1/g' anykernel.sh
        sed -i 's|block=/dev/block/platform/omap/omap_hsmmc.0/by-name/boot|block=/dev/block/by-name/boot|g' anykernel.sh
        sed -i 's/ramdisk_compression=gz/ramdisk_compression=auto/g' anykernel.sh
        
        zip -r ../Kernel-Next-Fire-Final.zip *

    - name: 7. Upload do Artefato
      uses: actions/upload-artifact@v4
      with:
        name: Kernel-Next-Flashable
        path: Kernel-Next-Fire-Final.zip
