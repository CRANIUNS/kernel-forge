name: Forja do KernelSU - Redmi 12 (Fire)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-kernel:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Sequestrar o Código-Fonte
      uses: actions/checkout@v4
      with:
        repository: mt6768-dev/android_kernel_xiaomi_fire
        ref: lineage-23.2

    - name: 2. Instalar Arsenal de Compilação
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential curl flex gcc-aarch64-linux-gnu clang lld llvm libssl-dev libelf-dev

    - name: 3. Injetar KernelSU e Patches de Compatibilidade
      run: |
        # Injeta o KernelSU
        curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -
        
        # Patch 1: Erro de Namespace (Linha 221)
        sed -i '221s/^/\/\//' drivers/kernelsu/core/init.c
        
        # Patch 2: Compatibilidade de função para Android 16 (copy_to_kernel_nofault)
        # Substituímos a função problemática pela função padrão de escrita segura do kernel
        sed -i 's/copy_to_kernel_nofault/probe_kernel_write/g' drivers/kernelsu/hook/arm64/patch_memory.c || true
        
        echo "Patches de compatibilidade aplicados."

    - name: 4. Preparar Configuração (Defconfig)
      run: |
        export ARCH=arm64
        export SUBARCH=arm64
        make O=out fire_defconfig
        
        # Aceita novas opções e desativa o bloqueio por avisos (WERROR)
        make O=out olddefconfig
        sed -i 's/CONFIG_WERROR=y/CONFIG_WERROR=n/g' out/.config

    - name: 5. Força Bruta (Compilação)
      run: |
        export ARCH=arm64
        export SUBARCH=arm64
        make -j$(nproc --all) O=out \
          CC=clang \
          LD=ld.lld \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          STRIP=llvm-strip

    - name: 6. Extrair o Kernel (Image.gz)
      uses: actions/upload-artifact@v4
      with:
        name: Kernel-Redmi12-Fire-KSU
        path: out/arch/arm64/boot/Image.gz
