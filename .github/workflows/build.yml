name: Forja do KernelSU - Redmi 12 (Fire)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-kernel:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Sequestrar o Código-Fonte
      uses: actions/checkout@v4
      with:
        repository: mt6768-dev/android_kernel_xiaomi_fire
        ref: lineage-23.2

    - name: 2. Instalar Arsenal de Compilação
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential curl flex gcc-aarch64-linux-gnu clang lld llvm libssl-dev libelf-dev

    - name: 3. Injetar KernelSU (Versão de Compatibilidade Estável)
      run: |
        # O Pulo do Gato: Baixa o script da versão estável v0.9.5 em vez da MAIN experimental
        curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/v0.9.5/kernel/setup.sh" | bash -s v0.9.5
        
        # Patch Cirúrgico de Segurança (caso o erro da linha 221 ainda persista na v0.9.5)
        sed -i '221s/^/\/\//' drivers/kernelsu/core/init.c || true
        
        echo "KernelSU v0.9.5 injetado e preparado."

    - name: 4. Preparar Configuração (Defconfig)
      run: |
        export ARCH=arm64
        export SUBARCH=arm64
        make O=out fire_defconfig
        make O=out olddefconfig
        sed -i 's/CONFIG_WERROR=y/CONFIG_WERROR=n/g' out/.config

    - name: 5. Força Bruta (Compilação)
      run: |
        export ARCH=arm64
        export SUBARCH=arm64
        make -j$(nproc --all) O=out \
          CC=clang \
          LD=ld.lld \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          STRIP=llvm-strip

    - name: 6. Extrair o Kernel (Image.gz)
      uses: actions/upload-artifact@v4
      with:
        name: Kernel-Redmi12-Fire-KSU
        path: out/arch/arm64/boot/Image.gz
